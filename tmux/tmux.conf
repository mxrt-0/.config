# Enable 256 color
set -g terminal-overrides ',st-256color:Tc'

# Windows start at 1
set -g base-index 1

# Set faster pane switching
set -s escape-time 0

# Status bar customization
set -g status-style "bg=#BFBFBF, fg=#ffffff"
set -g status-left " 🌀 #S "
set -g status-right "%Y-%m-%d %H:%M

# Remove delay between ESC and vim's NORMAL
set -sg escape-time 0

